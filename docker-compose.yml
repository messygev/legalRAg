services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
      POSTGRES_DB: legal_rag
    ports: ["5432:5432"]
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports: ["6333:6333"]

  api:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install fastapi uvicorn pydantic python-dateutil && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]
    depends_on: [postgres, qdrant]
