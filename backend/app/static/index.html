<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal RAG Bescheid-Kompass</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Legal RAG <span>Bescheid-Kompass</span></h1>
    <p>Keine Rechtsberatung · beleggestützte Analyse</p>
  </header>
  <main class="layout">
    <section class="card">
      <h2>Recherche</h2>
      <form id="searchForm">
        <label for="query">Frage</label>
        <input id="query" placeholder="z. B. Was ist ein Verwaltungsakt?" required minlength="3" />
        <label for="effectiveDate">Gültigkeitsdatum</label>
        <input id="effectiveDate" type="date" required />
        <button>Suchen</button>
      </form>
      <pre id="searchResult" class="result" aria-live="polite"></pre>
    </section>

    <section class="card">
      <h2>Bescheid-Analyse</h2>
      <form id="noticeForm">
        <label for="noticeText">Bescheidtext</label>
        <textarea id="noticeText" rows="10" placeholder="Bescheidtext hier einfügen ..." required minlength="20"></textarea>
        <div class="row">
          <div>
            <label for="receivedDate">Empfangsdatum</label>
            <input id="receivedDate" type="date" />
          </div>
          <div>
            <label for="noticeEffectiveDate">Stichtag</label>
            <input id="noticeEffectiveDate" type="date" required />
          </div>
        </div>
        <button>Analysieren</button>
      </form>
      <pre id="noticeResult" class="result" aria-live="polite"></pre>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
